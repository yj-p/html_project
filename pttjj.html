<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>葡萄糖过饱和溶液 · 基于文献数据的结晶模拟</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(145deg, #f5f0eb 0%, #e8e0d8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 16px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 250, 245, 0.75);
      backdrop-filter: blur(6px);
      border-radius: 56px 56px 48px 48px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.1);
      padding: 28px 28px 40px;
      border: 1px solid rgba(255, 242, 230, 0.5);
    }
    h1 {
      font-weight: 500;
      font-size: 1.7rem;
      letter-spacing: 1px;
      color: #3d2c1b;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      padding-left: 8px;
      flex-wrap: wrap;
    }
    h1 small {
      font-size: 0.85rem;
      font-weight: 400;
      color: #7a5f44;
      background: #e8d9cc;
      padding: 0 14px;
      border-radius: 40px;
      line-height: 1.8;
    }
    .subhead {
      color: #5a4a38;
      padding-left: 12px;
      margin-bottom: 24px;
      font-size: 0.95rem;
      border-left: 4px solid #b48a6b;
      padding-left: 16px;
      background: rgba(180, 138, 107, 0.08);
      border-radius: 0 20px 20px 0;
    }
    .display-area {
      background: #cfc1b0;
      background-image: radial-gradient(circle at 20% 30%, #e6d9cb 0%, #b7a494 90%);
      border-radius: 120px 120px 80px 80px;
      padding: 30px 20px 20px;
      box-shadow: inset 0 -8px 0 #8a7a68, 0 12px 28px rgba(0,0,0,0.3);
      margin-bottom: 28px;
      position: relative;
    }
    .beaker {
      background: linear-gradient(180deg, #eaf5fc 0%, #c8deec 100%);
      border-radius: 0 0 60px 60px;
      border: 6px solid #b3c9d9;
      border-top: 12px solid #b3c9d9;
      box-shadow: inset 0 8px 12px rgba(0,30,50,0.2), 0 0 0 2px #8aaec9;
      height: 220px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .beaker::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 6px;
      width: 30px;
      height: 20px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      filter: blur(3px);
      opacity: 0.6;
      pointer-events: none;
      z-index: 2;
    }
    .beaker::after {
      content: '';
      position: absolute;
      bottom: 6px;
      right: 16px;
      width: 50px;
      height: 16px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      filter: blur(6px);
      pointer-events: none;
      z-index: 2;
    }
    .solution {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(0deg, #b3d9f0 0%, #d7edfd 70%);
      transition: background 0.25s;
      pointer-events: none;
    }
    .crystal-svg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .crystal-svg svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .data-panel {
      display: flex;
      justify-content: space-between;
      background: #2a241ecc;
      backdrop-filter: blur(4px);
      padding: 12px 22px;
      border-radius: 60px;
      color: #f2ede8;
      margin: 16px 8px 24px 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      flex-wrap: wrap;
      gap: 6px 10px;
      border: 1px solid #5e4e3d;
    }
    .data-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .data-item .label {
      font-size: 0.85rem;
      opacity: 0.8;
      letter-spacing: 0.3px;
    }
    .data-item .value {
      font-size: 1.3rem;
      font-weight: 600;
      color: #ffdcb0;
      background: #3d3328;
      padding: 0 12px;
      border-radius: 40px;
      line-height: 1.6;
      letter-spacing: 0.5px;
    }
    .data-item .unit {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-left: 2px;
    }
    .slider-block {
      padding: 8px 10px 12px;
      border-radius: 60px;
      background: #d6c6b6;
      box-shadow: inset 0 2px 6px #b8a595;
      margin-bottom: 12px;
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
      color: #2d241b;
      padding: 0 12px 6px;
    }
    .slider-header span:first-child {
      background: #3d2c1b;
      color: #f0e0d0;
      padding: 0 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .slider-header span:last-child {
      background: #3d2c1b;
      color: #f0e0d0;
      padding: 0 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    input[type="range"] {
      width: 100%;
      margin: 8px 0 6px;
      -webkit-appearance: none;
      appearance: none;
      height: 12px;
      border-radius: 20px;
      background: linear-gradient(90deg, #4c7a9c, #b0d0e8);
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f0ea;
      border: 2px solid #3f5e7a;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      cursor: grab;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.12);
      background: #ffffff;
    }
    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f0ea;
      border: 2px solid #3f5e7a;
      cursor: grab;
    }
    .temp-indicator {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #192f3f;
      background: #cfdde9cc;
      padding: 0 24px;
      border-radius: 60px;
      display: inline-block;
      margin: 6px auto 0;
    }
    .float-note {
      background: #f7ede3;
      border-left: 8px solid #bb7a44;
      padding: 14px 18px;
      border-radius: 40px 12px 12px 40px;
      margin: 16px 6px 4px 6px;
      font-weight: 500;
      color: #2d1f12;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.98rem;
    }
    .float-note::before {
      content: "📖";
      font-size: 1.8rem;
      line-height: 1;
    }
    .footer-note {
      margin-top: 16px;
      color: #4b3d2e;
      text-align: right;
      font-size: 0.75rem;
      opacity: 0.6;
      letter-spacing: 0.3px;
    }
    .badge {
      background: #2d5f3b;
      color: #e8f5e0;
      padding: 0 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 400;
      line-height: 2;
      margin-left: 8px;
    }
    @media (max-width: 500px) {
      .card { padding: 16px; }
      .data-panel { flex-direction: column; align-items: stretch; gap: 4px; }
      .data-item { justify-content: space-between; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>
    🧪 葡萄糖过饱和溶液
    <small>基于文献数据的结晶模拟</small>
    <span class="badge">Alves et al. 2007</span>
  </h1>
  <div class="subhead">拖动滑条观察晶体析出</div>

  <div class="display-area">
    <div class="beaker" id="beaker">
      <div class="solution" id="solutionBg"></div>
      <div class="crystal-svg" id="crystalContainer">
        <svg viewBox="0 0 400 220" preserveAspectRatio="xMidYMid meet" id="crystalSvg">
        </svg>
      </div>
    </div>
  </div>

  <div class="data-panel" id="dataPanel">
    <div class="data-item"><span class="label">🌡️ 温度</span><span class="value" id="tempDisplay">40</span><span class="unit">°C</span></div>
    <div class="data-item"><span class="label">🧊 溶解度</span><span class="value" id="solubilityDisplay">60.3</span><span class="unit">g / 100g</span></div>
    <div class="data-item"><span class="label">💎 晶体状态</span><span class="value" id="stateDisplay" style="font-size:1rem; background:#4d3d2b; padding:0 14px;">澄清</span></div>
  </div>

  <div class="slider-block">
    <div class="slider-header">
      <span>❄️ 0°C</span>
      <span style="background:transparent; color:#2d241b; font-weight:600;">滑动调节</span>
      <span>☀️ 40°C</span>
    </div>
    <input type="range" id="tempSlider" min="0" max="40" value="40" step="1">
    <div style="display:flex; justify-content:center; margin-top:4px;">
      <span class="temp-indicator" id="tempLabel">40 °C</span>
    </div>
  </div>

  <div class="float-note">
    <span>晶体析出量随温度降低而增加</span>
  </div>
  <div class="footer-note">⚡ 大田红曲酒酿造情境 · 数据驱动型虚拟实验</div>
</div>

<script>
  (function() {
    // ----- 基于文献表2的真实溶解度数据 (Alves et al., 2007) -----
    // 0°C 为线性外推值 (拟合方程: Sol = 0.674*T + 33.8)
    const LITERATURE_DATA = {
      0:  { solubility: 33.8, state: '大量结晶', crystalCount: 140 },
      10: { solubility: 40.4, state: '结晶增多', crystalCount: 85 },
      20: { solubility: 47.8, state: '微量析出', crystalCount: 45 },
      30: { solubility: 53.4, state: '微量析出', crystalCount: 25 },
      40: { solubility: 60.3, state: '澄清',     crystalCount: 0 }
    };

    // 插值函数：根据温度获取溶解度、晶体数量、状态
    function getDataAtTemperature(temp) {
      const t = Math.round(temp);
      if (t in LITERATURE_DATA) {
        return { ...LITERATURE_DATA[t] };
      }

      const keys = Object.keys(LITERATURE_DATA).map(Number).sort((a,b) => a - b);
      let lower = keys[0], upper = keys[keys.length - 1];
      for (let i = 0; i < keys.length - 1; i++) {
        if (t >= keys[i] && t <= keys[i+1]) {
          lower = keys[i];
          upper = keys[i+1];
          break;
        }
      }

      const ratio = (t - lower) / (upper - lower);
      const sol = LITERATURE_DATA[lower].solubility + ratio * (LITERATURE_DATA[upper].solubility - LITERATURE_DATA[lower].solubility);
      const count = Math.floor(LITERATURE_DATA[lower].crystalCount + ratio * (LITERATURE_DATA[upper].crystalCount - LITERATURE_DATA[lower].crystalCount));
      
      let state = '澄清';
      if (count >= 120) state = '大量结晶';
      else if (count >= 60) state = '结晶增多';
      else if (count >= 10) state = '微量析出';
      else state = '澄清';

      return {
        solubility: Math.round(sol * 10) / 10,
        crystalCount: count,
        state: state
      };
    }

    const slider = document.getElementById('tempSlider');
    const tempDisplay = document.getElementById('tempDisplay');
    const solubilityDisplay = document.getElementById('solubilityDisplay');
    const stateDisplay = document.getElementById('stateDisplay');
    const tempLabel = document.getElementById('tempLabel');
    const svg = document.getElementById('crystalSvg');
    const beaker = document.getElementById('beaker');

    function renderCrystals(count, temp) {
      const existingGroup = svg.querySelector('#crystalGroup');
      if (existingGroup) existingGroup.remove();

      const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      group.setAttribute('id', 'crystalGroup');

      if (count === 0) {
        svg.appendChild(group);
        return;
      }

      let baseSize = 4;
      let color = '#f5f2ed';
      let opacityRange = [0.5, 0.9];
      if (temp <= 5) {
        baseSize = 8;
        color = '#fafffd';
        opacityRange = [0.7, 1.0];
      } else if (temp <= 20) {
        baseSize = 5.5;
        color = '#f0ede8';
        opacityRange = [0.5, 0.85];
      } else {
        baseSize = 3.5;
        color = '#e8e3dc';
        opacityRange = [0.3, 0.6];
      }

      for (let i = 0; i < count; i++) {
        let x, y;
        if (i < count * 0.7) {
          x = 20 + Math.random() * 340;
          y = 150 + Math.random() * 60;
        } else {
          x = 30 + Math.random() * 320;
          y = 60 + Math.random() * 100;
        }
        x = Math.min(380, Math.max(10, x));
        y = Math.min(205, Math.max(30, y));

        const size = baseSize * (0.4 + Math.random() * 0.9);
        const rot = Math.random() * 60 - 30;
        const opacity = opacityRange[0] + Math.random() * (opacityRange[1] - opacityRange[0]);

        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        const half = size * 0.6;
        const points = [
          [0, -half], [half, 0], [0, half], [-half, 0]
        ].map(p => {
          const dx = (Math.random() - 0.5) * 1.2;
          const dy = (Math.random() - 0.5) * 1.2;
          return (p[0] + dx) + ',' + (p[1] + dy);
        }).join(' ');

        poly.setAttribute('points', points);
        poly.setAttribute('transform', `translate(${x}, ${y}) rotate(${rot})`);
        poly.setAttribute('fill', color);
        poly.setAttribute('opacity', opacity);
        poly.setAttribute('stroke', '#d6d0c5');
        poly.setAttribute('stroke-width', '0.4');
        if (Math.random() > 0.7) {
          poly.setAttribute('stroke', '#f5f0ea');
          poly.setAttribute('stroke-width', '0.7');
        }
        group.appendChild(poly);
      }

      if (count > 40) {
        for (let i = 0; i < 12; i++) {
          const x = 20 + Math.random() * 360;
          const y = 50 + Math.random() * 150;
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', x);
          dot.setAttribute('cy', y);
          dot.setAttribute('r', 1 + Math.random() * 2.5);
          dot.setAttribute('fill', '#fefefa');
          dot.setAttribute('opacity', 0.2 + Math.random() * 0.3);
          group.appendChild(dot);
        }
      }

      svg.appendChild(group);
    }

    function updateExperiment(temp) {
      const t = Math.round(temp);
      tempDisplay.textContent = t;
      tempLabel.textContent = t + ' °C';

      const data = getDataAtTemperature(t);
      const solubility = data.solubility;
      const crystalCount = data.crystalCount;
      const state = data.state;

      solubilityDisplay.textContent = solubility.toFixed(1);
      stateDisplay.textContent = state;

      if (state === '澄清') {
        stateDisplay.style.background = '#2d5f3b';
      } else if (state === '大量结晶') {
        stateDisplay.style.background = '#6d4c2a';
      } else {
        stateDisplay.style.background = '#4d5f4a';
      }

      renderCrystals(crystalCount, t);

      const sol = document.getElementById('solutionBg');
      if (t > 30) {
        sol.style.background = 'linear-gradient(0deg, #b3d9f0 0%, #d7edfd 70%)';
      } else if (t < 10) {
        sol.style.background = 'linear-gradient(0deg, #aac0ce 0%, #cde0ed 70%)';
      } else {
        sol.style.background = 'linear-gradient(0deg, #b8d4e6 0%, #d7edfd 70%)';
      }
    }

    slider.addEventListener('input', function(e) {
      const val = parseInt(e.target.value, 10);
      updateExperiment(val);
    });

    slider.value = 40;
    updateExperiment(40);

    beaker.addEventListener('click', function() {
      const note = document.querySelector('.float-note');
      note.style.transition = '0.1s';
      note.style.background = '#f5e7d9';
      setTimeout(() => { note.style.background = '#f7ede3'; }, 150);
    });

  })();
</script>
</body>
</html>
